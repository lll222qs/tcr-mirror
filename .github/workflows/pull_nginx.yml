name: Push nginx to TCR

on:
  workflow_dispatch:  # 手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ccr-gz.ccs.tencentyun.com  # ✅ 已修正：广州地域前缀
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Pull & Push nginx
        run: |
          docker pull nginx:latest
          docker tag nginx:latest ccr-gz.ccs.tencentyun.com/dev/nginx:latest  # ✅ 地址同步更新
          docker push ccr-gz.ccs.tencentyun.com/dev/nginx:latest               # ✅ 地址同步更新
          echo "✅ nginx pushed to TCR"