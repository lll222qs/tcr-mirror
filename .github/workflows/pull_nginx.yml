name: Push nginx to TCR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Pull & Push nginx
        run: |
          docker pull nginx:latest
          docker tag nginx:latest ccr.ccs.tencentyun.com/xxy_xxz_tcr_base/nginx:latest
          docker