name: Push nginx to TCR

on:
  workflow_dispatch:  # 手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Pull & Push nginx
        run: |
          docker pull nginx:latest
          docker tag nginx:latest ccr.ccs.tencentyun.com/dev/nginx:latest
          docker push ccr.ccs.tencentyun.com/dev/nginx:latest
          echo "✅ nginx pushed to TCR"